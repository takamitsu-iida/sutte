<!doctype html>
<html lang="ja">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="icon" type="image/svg+xml" href="../static/img/favicon.svg" />
  <title>スッテ図鑑 管理</title>
  <style>
    .back-link {
      display: block;
      padding: 10px 12px;
      text-decoration: none;
    }
    .back-link:hover {
      text-decoration: underline;
    }
  </style>
</head>

<body>
  <a class="back-link" href="../">← 元のページに戻る</a>
  <!-- Decap CMS (formerly Netlify CMS) -->
  <script>
    // NOTE: GitHub Pages配信のキャッシュ等で古い config.yml を掴む場合があるため、
    // config をHTML内で固定して手動初期化します。
    window.CMS_MANUAL_INIT = true;
    window.__SUTTE_CMS_CONFIG__ = {
      // 手動configを渡していても、Decap CMSはデフォルトで admin/config.yml をfetchして
      // マージします。二重読み込みによる collections 重複を避けるため無効化します。
      load_config_file: false,
      backend: {
        name: 'github',
        repo: 'takamitsu-iida/sutte',
        branch: 'main',
        // OAuthプロバイダ(Cloudflare Worker)のURL
        base_url: 'https://sutte-oauth.takamitsu-iida.workers.dev',
        auth_endpoint: 'auth',
      },
      publish_mode: 'simple',
      media_folder: 'static/img/uploads',
      public_folder: 'static/img/uploads',
      slug: {
        encoding: 'ascii',
        clean_accents: true,
        sanitize_replacement: '-',
      },
      collections: [
        {
          name: 'sutte',
          label: 'スッテ',
          files: [
            {
              name: 'sutte',
              label: '一覧',
              file: 'static/data/sutte.json',
              format: 'json',
              fields: [
                {
                  label: 'products',
                  name: 'products',
                  widget: 'list',
                  summary: '{{fields.manufacturer}} / {{fields.productName}} ({{fields.variants.length}}件)',
                  fields: [
                    { label: '商品ID', name: 'id', widget: 'string', required: false, hint: '例: md35s-reflect' },
                    { label: 'メーカー', name: 'manufacturer', widget: 'string', required: false },
                    { label: '商品名', name: 'productName', widget: 'string', required: false },
                    { label: '説明', name: 'description', widget: 'text', required: false },
                    { label: 'シリーズ', name: 'series', widget: 'string', required: false },
                    { label: 'サイズ(表示用)', name: 'size', widget: 'string', required: false, hint: '例: 3.0号 / 35' },
                    { label: '号(go)', name: 'go', widget: 'string', required: false, hint: '例: 3.0' },
                    { label: '重さ', name: 'weight', widget: 'string', required: false, hint: '例: 15g' },
                    { label: 'URL', name: 'url', widget: 'string', required: false },
                    {
                      label: 'variants',
                      name: 'variants',
                      widget: 'list',
                      summary: '{{fields.color}}',
                      fields: [
                        { label: 'バリエーションID', name: 'id', widget: 'hidden', required: false },
                        { label: 'カラー', name: 'color', widget: 'string', required: false },
                        {
                          label: '画像',
                          name: 'image',
                          widget: 'image',
                          required: false,
                          allow_multiple: false,
                          hint: 'アップロードすると /static/img/uploads に保存されます',
                        },
                        { label: 'メモ', name: 'note', widget: 'text', required: false },
                      ],
                    },
                  ],
                },
              ],
            },
          ],
        },
      ],
    };
  </script>
  <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>
  <script>
    (function () {
      if (!window.CMS || typeof window.CMS.registerEventListener !== 'function') return;

      const isNumericId = (value) => typeof value === 'string' && /^\d+$/.test(value);
      const toInt = (value) => {
        if (!isNumericId(value)) return null;
        const n = Number.parseInt(value, 10);
        return Number.isFinite(n) ? n : null;
      };

      window.CMS.registerEventListener({
        name: 'preSave',
        handler: ({ entry }) => {
          try {
            if (!entry || typeof entry.get !== 'function' || typeof entry.set !== 'function') return entry;

            const collection = entry.get('collection');
            const path = entry.get('path');
            if (collection !== 'sutte') return entry;
            if (typeof path === 'string' && !path.endsWith('static/data/sutte.json')) return entry;

            const data = entry.get('data');
            if (!data || typeof data.get !== 'function' || typeof data.set !== 'function') return entry;

            const products = data.get('products');
            if (!products || typeof products.map !== 'function' || typeof products.forEach !== 'function') return entry;

            // 既存の数値IDの最大値を基準に、variants の未採番/非数値/重複は max+1 以降で自動採番します。
            let maxOriginal = 0;
            const originalNumeric = new Set();

            products.forEach((product) => {
              if (!product || typeof product.get !== 'function') return;
              const variants = product.get('variants');
              if (!variants || typeof variants.forEach !== 'function') return;
              variants.forEach((variant) => {
                if (!variant || typeof variant.get !== 'function') return;
                const n = toInt(variant.get('id'));
                if (n === null) return;
                originalNumeric.add(n);
                if (n > maxOriginal) maxOriginal = n;
              });
            });

            const seen = new Set();
            let next = maxOriginal + 1;

            const normalizedProducts = products.map((product) => {
              if (!product || typeof product.get !== 'function' || typeof product.set !== 'function') return product;
              const variants = product.get('variants');
              if (!variants || typeof variants.map !== 'function') return product;

              const normalizedVariants = variants.map((variant) => {
                if (!variant || typeof variant.get !== 'function' || typeof variant.set !== 'function') return variant;

                const rawId = variant.get('id');
                const n = toInt(rawId);
                if (n !== null && !seen.has(n)) {
                  seen.add(n);
                  return variant.set('id', String(n));
                }

                while (seen.has(next) || originalNumeric.has(next)) next += 1;
                const assigned = next;
                seen.add(assigned);
                next += 1;
                return variant.set('id', String(assigned));
              });

              return product.set('variants', normalizedVariants);
            });

            return entry.set('data', data.set('products', normalizedProducts));
          } catch (e) {
            // ここで落ちると保存自体ができなくなるので、失敗時は素通りします。
            console.error('[sutte] preSave id auto-numbering failed', e);
            return entry;
          }
        },
      });
    })();

    window.CMS && window.CMS.init({ config: window.__SUTTE_CMS_CONFIG__ });
  </script>
</body>

</html>
